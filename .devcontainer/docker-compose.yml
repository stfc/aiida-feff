services:

  app:
    image: mcr.microsoft.com/devcontainers/python:3.12
    userns_mode: keep-id
    volumes:
      - ..:/workspace:cached
      - aiida-repository:/tmp/aiida-feff-repository
    environment:
      AIIDA_DB_HOST: postgres
      AIIDA_DB_PORT: "5432"
      AIIDA_DB_NAME: aiida
      AIIDA_DB_USER: aiida
      AIIDA_DB_PASS: aiida
      AIIDA_BROKER_HOST: rabbitmq
      AIIDA_BROKER_PORT: "5672"
      AIIDA_BROKER_USER: guest
      AIIDA_BROKER_PASS: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: sleep infinity

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiida
      POSTGRES_USER: aiida
      POSTGRES_PASSWORD: aiida
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiida"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-alpine
    environment:
      RABBITMQ_ERLANG_COOKIE: "devcontainer-cookie"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  postgres-data:
  aiida-repository:
